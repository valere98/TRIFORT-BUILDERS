<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – TRIFORT BUILDERS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --emerald:      #0f4c3a;
            --emerald-deep: #061a11;
            --emerald-mid:  #1a6648;
            --gold:         #c8701a;
            --gold-light:   #e09040;
            --cream:        #fcfaf7;
        }
        html, body { width:100%; height:100%; overflow:hidden; font-family:'Montserrat',sans-serif; }
        body { background-image: url('dna-bg.png'); background-size: cover; background-position: center; background-repeat: no-repeat; }
        body::before {
            content:''; position:fixed; inset:0; z-index:0;
            background:var(--emerald-deep);
        }

        /* ── BACKGROUND DECORATIVE IMAGE ── */
                 .bg-dna-img {
    position: fixed;
    inset: 0;                  /* covers the full page */
    z-index: 0;
    pointer-events: none;
}

.bg-dna-img img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;         /* fills without stretching */
    opacity: 0.18;
    filter: saturate(1.4) brightness(0.9);

    /* fades out the corners, full coverage in the center */
    mask-image: radial-gradient(ellipse 100% 100% at center, black 55%, transparent 100%);
    -webkit-mask-image: radial-gradient(ellipse 100% 100% at center, black 55%, transparent 100%);
}

        
       /* ── BRAND ── */
.brand {
    position: fixed; top: 36px; left: 48px; z-index: 10;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem; font-weight: 600;
    letter-spacing: 7px; text-transform: uppercase;
    color: rgba(255,255,255,0.88);
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.brand-sub {
    font-size: 1.0rem;       /* smaller than TRI-FORT */
    font-weight: 500;
    letter-spacing: 5px;
    color: var(--gold-light);
}

.brand-tagline {
    font-size: 0.52rem;      /* smallest of the three */
    font-weight: 300;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.38);
}

        /* ── PAGE LAYOUT ── */
        .page {
            position: relative; z-index: 1;
    width: 100%; height: 100vh;
    display: flex; align-items: center;
    justify-content: center;   /* ← was flex-end */
    padding: 0 20px;           /* ← replaces padding-right */
        }

        /* ── GLASS CARD ── */
        .glass-card {
    background: rgba(12, 62, 32, 0.25);
}
        .glass-card {
            
          width: 420px;
    padding: 52px 44px 44px;
    border-radius: 26px;
    
    backdrop-filter: blur(22px) saturate(160%);
    -webkit-backdrop-filter: blur(22px) saturate(160%);
    border-top:    1px solid rgba(23, 59, 34, 0.833);
    border-left:   1px solid rgba(23, 59, 34, 0.833);
    border-right:  1px solid rgba(23, 59, 34, 0.833);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    box-shadow: 0 28px 70px rgba(0,0,0,0.55), 0 4px 16px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(23, 59, 34, 0.833);
    animation: slideIn 1s cubic-bezier(0.16,1,0.3,1) both;
    margin: 0 auto;        /* centres the card horizontally */
    text-align: center;    /* centres inline content inside */
}

        @keyframes slideIn {
            from { opacity:0; transform:translateX(50px) scale(0.97); }
            to   { opacity:1; transform:translateX(0) scale(1); }
        }

        .card-eyebrow {
            font-size:0.6rem; letter-spacing:5px; text-transform:uppercase;
            color:var(--gold-light); font-weight:500; margin-bottom:10px;
        }
        .card-title {
            font-family:'Cormorant Garamond',serif; font-size:2.8rem;
            font-weight:400; color:#fff; line-height:1.1;
            text-shadow:0 2px 24px rgba(0,0,0,0.4);
        }
        .card-title em { font-style:italic; color:rgba(255,255,255,0.45); }
        .card-sub {
            margin:10px 0 34px; font-size:0.74rem;
            color:rgba(255,255,255,0.38); font-weight:300; letter-spacing:0.3px;
        }

        .form-group { margin-bottom:20px; }
        .form-group label {
            display:block; font-size:0.6rem; letter-spacing:3.5px;
            text-transform:uppercase; color:rgba(255,255,255,0.42);
            font-weight:500; margin-bottom:9px;
        }
        .input-wrap { position:relative; }
        .input-wrap i {
            position:absolute; left:16px; top:50%; transform:translateY(-50%);
            color:rgba(255,255,255,0.2); font-size:0.8rem;
            pointer-events:none; transition:color .3s;
        }
        .input-wrap:focus-within i { color:var(--gold-light); }
        .form-group input {
            width:100%; padding:13px 18px 13px 43px;
            background:rgba(255,255,255,0.055);
            border:1px solid rgba(255,255,255,0.13);
            border-radius:11px;
            font-family:'Montserrat',sans-serif; font-size:0.87rem;
            font-weight:300; color:#fff; outline:none;
            transition:background .3s, border-color .3s, box-shadow .3s;
        }
        .form-group input::placeholder { color:rgba(255,255,255,0.16); }
        .form-group input:focus {
            background:rgba(255,255,255,0.10);
            border-color:rgba(200,112,26,.65);
            box-shadow:0 0 0 3px rgba(200,112,26,.13);
        }

        .login-btn {
            width:100%; margin-top:10px; padding:15px;
            background:linear-gradient(135deg,var(--gold),var(--gold-light));
            border:none; border-radius:11px;
            font-family:'Montserrat',sans-serif; font-size:0.74rem;
            font-weight:600; letter-spacing:3.5px; text-transform:uppercase;
            color:#fff; cursor:pointer; position:relative; overflow:hidden;
            transition:transform .2s, box-shadow .3s;
            box-shadow:0 6px 24px rgba(200,112,26,.45);
        }
        .login-btn::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%);
        }
        .login-btn:hover  { transform:translateY(-2px); box-shadow:0 10px 32px rgba(200,112,26,.6); }
        .login-btn:active { transform:translateY(0); }
        .login-btn:disabled { opacity:.55; cursor:not-allowed; transform:none; }

        .msg { margin-top:13px; padding:10px 14px; border-radius:9px; font-size:0.75rem; display:none; }
        .msg.error   { background:rgba(220,60,60,.13); border:1px solid rgba(220,60,60,.27); color:#ff9090; }
        .msg.success { background:rgba(28, 78, 45, 0.13); border:1px solid rgba(50,200,100,.27); color:#7dffa8; }

        .divider {
            display:flex; align-items:center; gap:12px;
            margin:26px 0 17px;
        }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.09); }
        .divider span { font-size:0.56rem; letter-spacing:3px; color:rgba(255,255,255,0.16); text-transform:uppercase; }

        .back-link { text-align:center; }
        .back-link a {
            font-size:0.66rem; letter-spacing:2px; text-transform:uppercase;
            color:rgba(255,255,255,.26); text-decoration:none;
            font-weight:300; transition:color .3s;
        }
        .back-link a:hover { color:var(--gold-light); }

        @media (max-width:700px) {
            .page { justify-content:center; padding:20px; }
            .glass-card { width:100%; max-width:400px; padding:36px 26px 30px; }
            .brand { left:22px; top:22px; }
        }
    </style>
</head>
<body>
    
 <div class="brand">
    TRI-FORT 
    <span class="brand-sub">Construction</span>
    <span class="brand-tagline">transparency through builds.</span>
</div>

<div class="bg-dna-img">
    <img src="images/admi.png" alt="">
</div>

<div class="page">
    <div class="glass-card">
        <div class="card-eyebrow">Secure Access</div>
        <h1 class="card-title">Admin<br><em>Portal</em></h1>
        <p class="card-sub">Sign in to manage projects &amp; clients..</p>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrap">
                    <input type="email" id="email" name="email" placeholder="admin@trifort.com" required>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
            <div class="msg error"   id="errorMsg"></div>
            <div class="msg success" id="successMsg"></div>
        </form>

        <div class="divider"><span>Tri-fort construction</span></div>
        <div class="back-link"><a href="index.html">← Return to Website</a></div>
    </div>
</div>

<!-- Three.js r128 -->

<script>


/* ═══════════════════════════════
   Login form
   ═══════════════════════════════ */
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn      = e.target.querySelector('button[type="submit"]');
    const errEl    = document.getElementById('errorMsg');
    const sucEl    = document.getElementById('successMsg');

    errEl.style.display = 'none';
    sucEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing In… (may take 30s)';

    try {
        const res  = await fetch('https://trifort-builders.onrender.com/api/auth/login', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('adminToken', data.token);
            localStorage.setItem('adminUser', JSON.stringify(data.user));
            sucEl.textContent = 'Login successful! Redirecting…';
            sucEl.style.display = 'block';
            setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1500);
        } else {
            errEl.textContent = data.error || 'Login failed. Please try again.';
            errEl.style.display = 'block';
        }
    } catch {
        errEl.textContent = 'Server error. Please try again.';
        errEl.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
});
</script>
</body>
</html>
