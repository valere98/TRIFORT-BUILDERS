<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Client Reviews – TRI-FORT CONSTRUCTION</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --E:#1e3d2b;--ED:#0c1a10;--EM:#2a5a3e;
  --G:#c8701a;--GL:#d9893a;
  --BG:#fcfaf7;--W:#fff;--CH:#2a2a2a;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Montserrat',sans-serif;background:var(--ED);color:var(--W);cursor:none;user-select:none;}


#CUR,#CURR{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s;}
#CUR{width:10px;height:10px;background:var(--G);}
#CURR{width:36px;height:36px;border:1px solid rgba(200,112,26,.45);background:transparent;}

 
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(65, 103, 82, 0.08);
            backdrop-filter: blur(14px);
            box-shadow: 0 1px 0 var(--sand);
            z-index: 1000;
            transition: transform .4s ease, background .4s ease;
        }
        .header.hidden { transform: translateY(-100%); }
        .header.scrolled {
            background: rgba(30,61,43,0.08);
            box-shadow: 0 4px 40px rgba(252,250,247,0.97);
        }
        .header a{
                      color: var(--W);
                     text-decoration: none;
                  }

        .header a:hover{
                     color: var(--G);               
                 }
        .header-container {
            max-width: 1400px; margin: 0 auto;
            padding:0 48px;height:64px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo-wrap { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .logo-img { height: 72px; width: auto; display: block; }
        .logo-img-light { display: none; }
        .logo-img-dark { display: block; }
        .logo-text-block { display: flex; flex-direction: column; }
        .logo-name {
               font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--W);
        }
        .logo-tagline {
            font-size: 0.55rem; letter-spacing: 2px;
            color: var(--G); text-transform: uppercase;
            font-weight: 500; margin-top: 3px;
        }


.scene{position:fixed;inset:0;z-index:0;}
.scene-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:opacity 1.4s cubic-bezier(.4,0,.2,1);
  animation:KB 28s ease-in-out infinite alternate;
}
@keyframes KB{
  from{transform:scale(1) translate(0,0);}
  to{transform:scale(1.1) translate(-1.5%,1%);}
}
.scene-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    135deg,
    rgba(8,20,12,.92) 0%,
    rgba(8,20,12,.72) 50%,
    rgba(8,20,12,.88) 100%
  );
}

.scene-overlay::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,.5) 100%);
}


.progress{
  position:fixed;bottom:0;left:0;z-index:100;
  height:2px;background:var(--G);
  transition:width .8s cubic-bezier(.4,0,.2,1);
}


.stage{
  position:relative;z-index:10;
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 48px 48px;
}


.eyebrow{
  font-size:.48rem;font-weight:500;letter-spacing:5px;text-transform:uppercase;
  color:var(--GL);margin-bottom:28px;
  display:flex;align-items:center;gap:16px;
  opacity:0;animation:fadeUp .8s .2s forwards;
}
.eyebrow::before,.eyebrow::after{content:'';width:40px;height:1px;background:var(--G);opacity:.6;}


.big-quote{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(5rem,8vw,9rem);
  line-height:.8;color:var(--G);opacity:.25;
  margin-bottom:-24px;
  align-self:flex-start;padding-left:min(12vw,140px);
  opacity:0;animation:fadeUp .8s .3s forwards;
}


.quote-wrap{
  max-width:900px;width:100%;text-align:center;
  position:relative;
}
.quote-text{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.45rem,2.8vw,2.4rem);
  font-style:italic;font-weight:300;
  line-height:1.65;color:rgba(255,255,255,.93);
  letter-spacing:.3px;
}
.quote-text.animating{
  animation:quoteOut .4s forwards;
}
.quote-text.entering{
  animation:quoteIn .6s forwards;
}
@keyframes quoteOut{
  to{opacity:0;transform:translateY(-18px);}
}
@keyframes quoteIn{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}


.qdiv{
  width:48px;height:1px;background:var(--G);
  margin:28px auto 24px;opacity:.7;
}


.attr{text-align:center;}
.attr-name{
  font-size:.68rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:var(--W);margin-bottom:6px;
}
.attr-role{
  font-size:.54rem;font-weight:300;letter-spacing:1px;
  color:rgba(255,255,255,.45);margin-bottom:8px;
}
.attr-proj{
  font-size:.46rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  color:var(--GL);display:inline-flex;align-items:center;gap:10px;
}
.attr-proj::before,.attr-proj::after{content:'';width:20px;height:1px;background:var(--G);}


.stars{
  color:var(--G);font-size:.65rem;letter-spacing:3px;
  margin-bottom:24px;
}


.controls{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;align-items:center;gap:24px;
}
.ctrl-btn{
  width:44px;height:44px;border:1px solid rgba(255,255,255,.2);
  background:rgba(12,26,16,.6);backdrop-filter:blur(8px);
  color:rgba(255,255,255,.7);font-size:.8rem;
  display:flex;align-items:center;justify-content:center;
  cursor:none;transition:border-color .2s,color .2s,background .2s;
}
.ctrl-btn:hover{border-color:var(--G);color:var(--G);background:rgba(200,112,26,.08);}
.ctrl-count{
  font-size:.5rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.35);min-width:56px;text-align:center;
}


.filters{
  position:fixed;top:82px;left:50%;transform:translateX(-50%);
  z-index:90;display:flex;gap:8px;padding:12px 20px;
  background:rgba(12,26,16,.7);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.fp{
  font-size:.45rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  padding:7px 18px;border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.45);background:transparent;
  cursor:none;transition:all .2s;
}
.fp.active,.fp:hover{border-color:var(--G);color:var(--G);}
.fp.active{background:rgba(200,112,26,.08);}


.thumbs{
  position:fixed;right:40px;top:50%;transform:translateY(-50%);
  z-index:90;display:flex;flex-direction:column;gap:8px;
}
.thumb{
  width:52px;height:36px;overflow:hidden;
  opacity:.3;cursor:none;transition:opacity .25s,transform .25s;
  border:1px solid transparent;
}
.thumb.active{opacity:1;border-color:var(--G);}
.thumb:hover{opacity:.7;transform:scaleX(1.05);}
.thumb img{width:100%;height:100%;object-fit:cover;}


.movl{
  position:fixed;inset:0;z-index:200;
  background:rgba(8,20,12,.88);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.movl.op{opacity:1;pointer-events:all;}
.modal{
  background:var(--BG);width:min(560px,92vw);
  max-height:88vh;overflow-y:auto;position:relative;
}
.modal-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border:none;background:transparent;
  font-size:.9rem;color:var(--CH);cursor:none;z-index:2;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s;
}
.modal-close:hover{color:var(--G);}
.modal-img{position:relative;height:220px;overflow:hidden;}
.modal-img-in{
  position:absolute;inset:0;background-size:cover;background-position:center;
  animation:KB 20s ease-in-out infinite alternate;
}
.modal-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,20,12,.7) 0%,transparent 60%);}
.modal-badge{
  position:absolute;bottom:16px;left:20px;
  font-size:.42rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;
  padding:5px 12px;background:var(--G);color:#fff;
}
.modal-body{padding:28px 28px 32px;}
.modal-stars{font-size:.65rem;color:var(--G);letter-spacing:3px;margin-bottom:16px;}
.modal-q{
  font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-style:italic;
  font-weight:300;line-height:1.72;color:var(--CH);margin-bottom:20px;
}
.modal-div{width:36px;height:1px;background:var(--G);margin-bottom:16px;}
.modal-auth{font-size:.62rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--E);margin-bottom:5px;}
.modal-role{font-size:.55rem;font-weight:300;color:var(--CH);opacity:.55;margin-bottom:10px;}
.modal-proj{
  font-size:.46rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  color:var(--G);display:flex;align-items:center;gap:8px;
}
.modal-proj::before{content:'';width:20px;height:1px;background:var(--G);}


.fmovl{
  position:fixed;inset:0;z-index:200;
  background:rgba(8,20,12,.88);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.fmovl.op{opacity:1;pointer-events:all;}
.fbox{background:var(--BG);width:min(480px,92vw);position:relative;}
.fclose{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border:none;background:transparent;
  font-size:.9rem;color:var(--CH);cursor:none;
  display:flex;align-items:center;justify-content:center;
  transition:color .2s;
}
.fclose:hover{color:var(--G);}
.fhd{padding:28px 28px 20px;border-bottom:1px solid rgba(0,0,0,.07);}
.feye{
  font-size:.46rem;font-weight:500;letter-spacing:4px;text-transform:uppercase;
  color:var(--G);margin-bottom:8px;
}
.fttl{
  font-family:'Cormorant Garamond',serif;font-size:1.8rem;
  font-weight:300;color:var(--E);line-height:1.1;
}
.fttl em{font-style:italic;color:var(--G);}
.fbdy{padding:20px 28px 28px;display:flex;flex-direction:column;gap:14px;}
.fg label{display:block;font-size:.46rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--CH);opacity:.6;margin-bottom:6px;}
.fg input,.fg textarea{
  width:100%;border:none;border-bottom:1px solid rgba(0,0,0,.15);
  padding:8px 0;font-family:'Montserrat',sans-serif;font-size:.62rem;
  background:transparent;color:var(--CH);outline:none;
  transition:border-color .2s;
}
.fg input:focus,.fg textarea:focus{border-color:var(--G);}
.fg textarea{resize:none;line-height:1.6;}
.star-pick{display:flex;gap:6px;margin-top:4px;}
.sp{font-size:1.2rem;color:var(--SD,#ccc);cursor:none;transition:color .15s;}
.sp.on{color:var(--G);}
.fsubmit{
  margin-top:6px;padding:13px 28px;background:var(--E);color:#fff;border:none;
  font-size:.5rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  cursor:none;display:flex;align-items:center;gap:10px;
  transition:background .2s;align-self:flex-start;
}
.fsubmit:hover{background:var(--G);}


.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--E);color:#fff;padding:10px 24px;
  font-size:.5rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}


.page-badge{
  position:fixed;left:40px;bottom:46px;z-index:90;
  font-size:.44rem;font-weight:500;letter-spacing:4px;text-transform:uppercase;
  color:rgba(255,255,255,.2);writing-mode:vertical-rl;transform:rotate(180deg);
  opacity:0;animation:fadeUp .8s .6s forwards;
}


.share-btn{
  position:fixed;right:112px;bottom:36px;z-index:100;
  font-size:.46rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;
  padding:10px 20px;border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.5);background:rgba(12,26,16,.6);backdrop-filter:blur(8px);
  cursor:none;transition:all .2s;
}
.share-btn:hover{border-color:var(--G);color:var(--G);}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}


@media(max-width:700px){
  .hdr{padding:0 20px;}
  .stage{padding:100px 24px 80px;}
  .thumbs{display:none;}
  .page-badge{display:none;}
  .filters{gap:4px;padding:10px 12px;}
  .fp{padding:6px 12px;}
  .big-quote{padding-left:0;align-self:center;}
  .share-btn{right:80px;bottom:28px;}
  .controls{bottom:24px;}
}
</style>
</head>

    <button class="fclose" onclick="closeForm()"><i class="fa-solid fa-xmark"></i></button>
    <div class="fhd">
      <div class="feye">Share Your Experience</div>
      <h2 class="fttl">Leave a <em>Review</em></h2>
    </div>
    <div class="fbdy">
      <div class="fg"><label>Full Name *</label><input id="FN" type="text" placeholder="Your full name"></div>
      <div class="fg"><label>Company / Project</label><input id="FC" type="text" placeholder="Company or project name"></div>
      <div class="fg"><label>Your Review *</label><textarea id="FQ" rows="4" placeholder="Share your experience with TRI-FORT…"></textarea></div>
      <div class="fg">
        <label>Rating</label>
        <div class="star-pick" id="SPICK">
          <span class="sp on" data-s="1">★</span><span class="sp on" data-s="2">★</span>
          <span class="sp on" data-s="3">★</span><span class="sp on" data-s="4">★</span>
          <span class="sp on" data-s="5">★</span>
        </div>
      </div>
      <button class="fsubmit" onclick="submitReview()">Submit Review <i class="fa-regular fa-arrow-right"></i></button>
    </div>
  </div>
</div>

<div class="toast" id="TOAST"></div>

<script>
const ALL_REVIEWS = [
  {type:'Commercial',q:'TRI-FORT delivered our Westlands project four months early without cutting a single corner. The transparency was unlike anything we had experienced before — every invoice, every report, every milestone communicated clearly.',auth:'James Kariuki',role:'Director, Kariuki Properties Ltd',proj:'Westlands Commerce Centre',img:'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=1400&q=80'},
  {type:'Residential',q:'The Karen estate finish quality is genuinely hotel-grade. Our buyers noticed it the moment they walked in. TRI-FORT\'s attention to detail is extraordinary — not just structurally but in every single finishing detail.',auth:'Amara Njoroge',role:'MD, Ridgeline Developments',proj:'Karen Ridgeline Estate',img:'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=1400&q=80'},
  {type:'Industrial',q:'Our cold-chain logistics hub was delivered on spec, on time, and within budget. The steel truss work spanning 30m with no interior columns was an engineering challenge TRI-FORT tackled with complete confidence.',auth:'Priya Mehta',role:'COO, EastPack Logistics',proj:'Athi River Logistics Hub',img:'https://images.unsplash.com/photo-1504307651254-35680f356dfd?w=1400&q=80'},
  {type:'Renovation',q:'Sensitive restoration of our 1930s heritage building — TRI-FORT understood the brief completely. The original stonework was preserved and the new service core inserted without touching the protected façade.',auth:'Margaret Waweru',role:'CEO, Muthaiga Country Club',proj:'Old Muthaiga Club Annex',img:'https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=1400&q=80'},
  {type:'Commercial',q:'Cross-border construction in Uganda is never simple. TRI-FORT made our Kampala mall look easy. Exceptional logistics, strong local subcontractor network, and the most transparent billing we have ever encountered.',auth:'Robert Ssemakula',role:'Chairman, Uganda Retail Holdings',proj:'Kampala Junction Mall',img:'https://images.unsplash.com/photo-1590247813693-5541d1c609fd?w=1400&q=80'},
  {type:'Industrial',q:'Every clean-room zone in our Dar es Salaam plant was built to exact food-grade specification. A technically demanding project mastered without a single deviation from the engineering brief.',auth:'Fatima Al-Rashid',role:'COO, AfriFood Manufacturing',proj:'Dar es Salaam Processing Plant',img:'https://images.unsplash.com/photo-1561134643-668f9057cce4?w=1400&q=80'},
  {type:'Residential',q:'The cantilevered terrace on our Ngong Hills villa is a structural masterpiece. TRI-FORT turned our architect\'s most ambitious idea into reality — the post-tensioned concrete work is flawless.',auth:'Private Client',role:'Residential · Private',proj:'Ngong Hills Retreat',img:'https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=1400&q=80'},
  {type:'Commercial',q:'Upperhill Business Plaza is 65% done and ahead of schedule. The weekly site reports with photos and cost updates give us complete confidence. We\'ve never felt this informed on a live build.',auth:'Daniel Omondi',role:'Director, Apex Office Group',proj:'Upperhill Business Plaza',img:'https://images.unsplash.com/photo-1541888946425-d81bb19240f5?w=1400&q=80'},
  {type:'Residential',q:'TRI-FORT\'s Kileleshwa Heights is everything we hoped for — solid structure, transparent billing, a responsive team, and a project manager who actually picks up the phone. This is how construction should work.',auth:'Samuel Githinji',role:'MD, Heights Properties Ltd',proj:'Kileleshwa Heights',img:'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=1400&q=80'},
];

let filtered=[...ALL_REVIEWS];
let cur=0;
let autoTimer=null;


const CE=document.getElementById('CUR'),CRE=document.getElementById('CURR');
let mx=window.innerWidth/2,my=window.innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;CE.style.left=mx+'px';CE.style.top=my+'px';});
(function t(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;CRE.style.left=rx+'px';CRE.style.top=ry+'px';requestAnimationFrame(t);})();
document.querySelectorAll('a,button,.thumb,.fp').forEach(el=>{
  el.addEventListener('mouseenter',()=>{CE.style.width='16px';CE.style.height='16px';CRE.style.width='50px';CRE.style.height='50px';});
  el.addEventListener('mouseleave',()=>{CE.style.width='10px';CE.style.height='10px';CRE.style.width='36px';CRE.style.height='36px';});
});


function renderThumbs(){
  const t=document.getElementById('THUMBS');
  t.innerHTML=filtered.map((r,i)=>`
    <div class="thumb${i===cur?' active':''}" onclick="goTo(${i})">
      <img src="${r.img}" alt="">
    </div>`).join('');
}

function showReview(i,dir=1){
  const r=filtered[i];
  const qt=document.getElementById('QTEXT');
  const scene=document.getElementById('SCENE_IMG');

  
  qt.classList.add('animating');
  setTimeout(()=>{
    qt.textContent='"'+r.q+'"';
    document.getElementById('ANAME').textContent=r.auth;
    document.getElementById('AROLE').textContent=r.role;
    document.getElementById('APROJ').textContent=r.proj;
    document.getElementById('CNT').textContent=(i+1)+' / '+filtered.length;

    
    scene.style.backgroundImage=`url('${r.img}')`;

    qt.classList.remove('animating');
    qt.classList.add('entering');
    setTimeout(()=>qt.classList.remove('entering'),600);

    
    document.querySelectorAll('.thumb').forEach((el,j)=>el.classList.toggle('active',j===i));

    
    const pct=((i+1)/filtered.length)*100;
    document.getElementById('PROG').style.width=pct+'%';

  },380);
}

function go(d){
  cur=((cur+d)%filtered.length+filtered.length)%filtered.length;
  showReview(cur,d);
  resetAuto();
}
function goTo(i){cur=i;showReview(i);resetAuto();}

function resetAuto(){
  clearInterval(autoTimer);
  autoTimer=setInterval(()=>go(1),7000);
}


function filterTo(type,btn){
  filtered=type==='all'?[...ALL_REVIEWS]:ALL_REVIEWS.filter(r=>r.type===type);
  cur=0;
  document.querySelectorAll('.fp').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderThumbs();
  showReview(0);
  resetAuto();
  toast('Showing '+filtered.length+' review'+(filtered.length!==1?'s':''));
}


function openModalCurrent(){openModalIdx(ALL_REVIEWS.indexOf(filtered[cur]));}
function openModalIdx(i){
  const r=ALL_REVIEWS[i];
  document.getElementById('M_IMG').style.backgroundImage=`url('${r.img}')`;
  document.getElementById('M_BADGE').textContent=r.type;
  document.getElementById('M_Q').textContent='"'+r.q+'"';
  document.getElementById('M_AUTH').textContent=r.auth;
  document.getElementById('M_ROLE').textContent=r.role;
  document.getElementById('M_PROJ').textContent=r.proj;
  document.getElementById('MOV').classList.add('op');
  document.body.style.overflow='hidden';
}
function closeM(){document.getElementById('MOV').classList.remove('op');document.body.style.overflow='';}
function closeMOV(e){if(e.target===document.getElementById('MOV'))closeM();}


function openForm(){document.getElementById('FMOV').classList.add('op');document.body.style.overflow='hidden';}
function closeForm(){document.getElementById('FMOV').classList.remove('op');document.body.style.overflow='';}
function closeFMOV(e){if(e.target===document.getElementById('FMOV'))closeForm();}
let chosenStar=5;
document.querySelectorAll('.sp').forEach(s=>{
  s.addEventListener('mouseenter',()=>{const v=+s.dataset.s;document.querySelectorAll('.sp').forEach(x=>x.classList.toggle('on',+x.dataset.s<=v));});
  s.addEventListener('mouseleave',()=>{document.querySelectorAll('.sp').forEach(x=>x.classList.toggle('on',+x.dataset.s<=chosenStar));});
  s.addEventListener('click',()=>{chosenStar=+s.dataset.s;document.querySelectorAll('.sp').forEach(x=>x.classList.toggle('on',+x.dataset.s<=chosenStar));});
});
function submitReview(){
  const n=document.getElementById('FN').value.trim();
  const q=document.getElementById('FQ').value.trim();
  if(!n||!q){toast('Please fill in your name and review.');return;}
  closeForm();toast('Thank you, '+n+'! Your review has been received.');
  document.getElementById('FN').value='';document.getElementById('FC').value='';document.getElementById('FQ').value='';
}


document.addEventListener('keydown',e=>{
  if(document.getElementById('MOV').classList.contains('op')||document.getElementById('FMOV').classList.contains('op')){
    if(e.key==='Escape'){closeM();closeForm();}return;
  }
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='Escape'){closeM();closeForm();}
});


function toast(msg){
  const t=document.getElementById('TOAST');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),3000);
}


renderThumbs();
showReview(0);
resetAuto();
</script>
