<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found – TRI-FORT CONSTRUCTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --emerald: #1e3d2b;
            --emerald-deep: #142a1e;
            --gold: #c8701a;
            --cream: #fcfaf7;
            --charcoal: #2a3a30;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--emerald-deep);
            color: var(--charcoal);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: 8rem;
            font-weight: 300;
            color: var(--gold);
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 2.5rem;
            color: white;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .error-desc {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .btn-primary {
            background: var(--gold);
            color: white;
        }
        .btn-primary:hover {
            background: #d97d1f;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: transparent;
            color: var(--gold);
            border-color: var(--gold);
        }
        .btn-secondary:hover {
            background: rgba(200, 112, 26, 0.1);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">
            We're sorry, but the page you're looking for doesn't exist. It may have been moved, deleted, or you may have mistyped the URL. Let us help you get back on track.
        </p>
        <div class="error-actions">
            <a href="index.html" class="btn btn-primary">Back to Home</a>
            <a href="contact.html" class="btn btn-secondary">Contact Us</a>
        </div>
    </div>
</body>
</html>
